<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Benzeri AI Sohbet</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #0f0f0f; color: #fff; }
    #chat { height: 80vh; overflow-y: auto; padding: 20px; }
    .message { margin: 15px 0; padding: 12px; border-radius: 8px; max-width: 80%; }
    .user { background: #1e88e5; margin-left: auto; text-align: right; }
    .ai { background: #333; }
    #input-area { position: fixed; bottom: 0; width: 100%; padding: 20px; background: #1a1a1a; display: flex; }
    input { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 16px; }
    button { padding: 15px 30px; margin-left: 10px; background: #1e88e5; border: none; border-radius: 8px; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Mesajını yaz...">
    <button onclick="sendMessage()">Gönder</button>
  </div>

  <script>
    let history = [];

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      history.push({ role: "user", content: message });
      input.value = '';

      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history })
      });

      const data = await response.json();
      addMessage(data.reply, 'ai');
      history.push({ role: "assistant", content: data.reply });
    }

    function addMessage(text, sender) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
